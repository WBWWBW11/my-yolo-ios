name: Build YOLO iOS 侧载 IPA
on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 2. 配置 Node 环境 (消除警告)
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. 初始化环境
        run: |
          set -euo pipefail
          echo "=== 环境检查 ==="
          ls -la "${{ github.workspace }}"
          echo "================="

      - name: 4. 清理旧缓存
        run: |
          set -euo pipefail
          rm -rf ~/Library/Developer/Xcode/DerivedData
          echo "✅ Xcode 缓存已清理"

      - name: 5. 解析依赖
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/示例应用程序/YOLORealTimeUIKit"
          xcodebuild -resolvePackageDependencies \
            -project YOLORealTimeUIKit.xcodeproj \
            -scheme YOLORealTimeUIKit

      - name: 6. 开始归档
        run: |
          set -euo pipefail
          cd "${{ github.workspace }}/示例应用程序/YOLORealTimeUIKit"
          
          xcodebuild archive \
            -project YOLORealTimeUIKit.xcodeproj \
            -scheme YOLORealTimeUIKit \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "${{ github.workspace }}/YOLO.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            ENABLE_BITCODE=NO

      - name: 7. 验证归档文件
        run: |
          set -euo pipefail
          APP_PATH="${{ github.workspace }}/YOLO.xcarchive/Products/Applications/YOLORealTimeUIKit.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 归档失败，未找到 .app"
            exit 1
          fi
          
          echo "✅ 归档成功: $APP_PATH"
          ls -lh "$APP_PATH"

      - name: 8. 打包 IPA
        run: |
          set -euo pipefail
          rm -rf Payload YOLO-Final.ipa
          mkdir -p Payload
          
          cp -R "${{ github.workspace }}/YOLO.xcarchive/Products/Applications/YOLORealTimeUIKit.app" Payload/
          
          find Payload -name ".DS_Store" -delete
          zip -qry YOLO-Final.ipa Payload
          
          IPA_SIZE=$(du -sh YOLO-Final.ipa | awk '{print $1}')
          echo "📦 打包完成: $IPA_SIZE"

      - name: 9. 上传产物
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-iOS-IPA
          path: YOLO-Final.ipa
          retention-days: 7
