name: Build YOLO iOS 侧载 IPA (最终终极版)
on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 2. 配置Node环境（消除警告）
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: 3. 全自动定位Xcode项目
        id: find_project
        run: |
          set -euo pipefail
          echo "=== 扫描仓库目录结构 ==="
          ls -R "${{ github.workspace }}"
          echo "========================="

          PROJECT_FILE=$(find "${{ github.workspace }}" -name "*.xcodeproj" -type d | head -n 1)
          
          if [ -z "$PROJECT_FILE" ]; then
            echo "❌ 错误：未找到Xcode项目文件(.xcodeproj)"
            exit 1
          fi

          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          PROJECT_NAME=$(basename "$PROJECT_FILE" .xcodeproj)
          
          echo "✅ 自动定位项目成功！"
          echo "项目名: $PROJECT_NAME"
          echo "项目路径: $PROJECT_DIR"
          
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_ENV
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_ENV

      - name: 4. 清理Xcode旧缓存
        run: |
          set -euo pipefail
          rm -rf ~/Library/Developer/Xcode/DerivedData
          xcodebuild clean \
            -project "${{ env.PROJECT_DIR }}/${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.PROJECT_NAME }}" \
            -configuration Release
          echo "✅ Xcode缓存清理完成"

      - name: 5. 解析项目依赖
        run: |
          set -euo pipefail
          cd "${{ env.PROJECT_DIR }}"
          xcodebuild -resolvePackageDependencies \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.PROJECT_NAME }}"
          echo "✅ 依赖解析完成"

      - name: 6. 真机归档（强制完整二进制）
        run: |
          set -euo pipefail
          cd "${{ env.PROJECT_DIR }}"
          xcodebuild archive \
            -project "${{ env.PROJECT_NAME }}.xcodeproj" \
            -scheme "${{ env.PROJECT_NAME }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "${{ github.workspace }}/YOLO.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE="" \
            ENABLE_BITCODE=NO \
            ONLY_ACTIVE_ARCH=NO \
            SKIP_INSTALL=NO
          echo "✅ 项目归档完成"

      - name: 7. 验证归档文件
        run: |
          set -euo pipefail
          APP_PATH="${{ github.workspace }}/YOLO.xcarchive/Products/Applications/${{ env.PROJECT_NAME }}.app"
          
          if [ ! -d "$APP_PATH" ]; then
            echo "❌ 归档失败，未找到.app应用文件"
            exit 1
          fi

          EXECUTABLE_NAME=$(defaults read "$APP_PATH/Info.plist" CFBundleExecutable)
          if [ ! -f "$APP_PATH/$EXECUTABLE_NAME" ]; then
            echo "❌ 归档失败，未找到核心二进制文件"
            exit 1
          fi

          echo "✅ 归档验证通过！"
          echo "应用路径: $APP_PATH"
          echo "核心二进制: $EXECUTABLE_NAME"
          ls -lh "$APP_PATH/$EXECUTABLE_NAME"

      - name: 8. 封装标准侧载IPA（修复空包误判）
        run: |
          set -euo pipefail
          rm -rf Payload YOLO-Final.ipa
          mkdir -p Payload

          cp -R "${{ github.workspace }}/YOLO.xcarchive/Products/Applications/${{ env.PROJECT_NAME }}.app" Payload/

          find Payload -name ".DS_Store" -delete
          find Payload -name "__MACOSX" -exec rm -rf {} + 2>/dev/null || true

          zip -qry YOLO-Final.ipa Payload

          IPA_SIZE=$(du -sh YOLO-Final.ipa | awk '{print $1}')
          echo "📦 IPA打包完成！最终大小: $IPA_SIZE"

          # 仅在小于100KB时报错，彻底适配你的项目大小
          IPA_SIZE_KB=$(du -k YOLO-Final.ipa | cut -f1)
          if [ "$IPA_SIZE_KB" -lt 100 ]; then
            echo "❌ 打包失败，生成空壳IPA，大小仅${IPA_SIZE}"
            exit 1
          fi

      - name: 9. 上传最终IPA产物
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-iOS-Final-IPA
          path: YOLO-Final.ipa
          retention-days: 7
