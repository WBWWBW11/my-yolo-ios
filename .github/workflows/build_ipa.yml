name: Build YOLO iOS Sideload IPA

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 预热依赖
        run: |
          # 针对 Swift Package 项目，先强制解析一遍依赖
          xcodebuild -resolvePackageDependencies -project YOLOIOSApp/YOLOIOSApp.xcodeproj

      - name: 3. 强制编译 (剥离证书逻辑)
        run: |
          # 明确指定项目文件和 Scheme，避免 find 出错
          # 使用 -destination 'generic/platform=iOS' 锁定真机环境
          xcodebuild build \
            -project YOLOIOSApp/YOLOIOSApp.xcodeproj \
            -scheme YOLOIOSApp \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO | xcpretty

      - name: 4. 提取战利品
        run: |
          mkdir -p Payload
          # 在 Xcode 默认输出目录寻找 .app 文件夹
          # 官方项目编译后通常会放在 DerivedData 的某个角落
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "YOLOIOSApp.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 还是没搜到 .app，尝试检查当前目录..."
            APP_PATH=$(find . -name "*.app" -type d | grep "Release" | head -n 1)
          fi

          if [ -z "$APP_PATH" ]; then
             echo "❌ 彻底失败，没找到编译产物"
             exit 1
          fi

          echo "✅ 捕获目标: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -qr YOLO-Full.ipa Payload
          
          # 打印大小，法师请盯着这行看！
          ls -lh YOLO-Full.ipa

      - name: 5. 最终发货
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-FINAL-IPA
          path: YOLO-Full.ipa
