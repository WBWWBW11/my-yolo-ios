name: Build YOLO iOS 侧载 IPA

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 自动定位工程 (解决秒挂问题)
        run: |
          # 寻找真正的工程文件
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          PROJ_DIR=$(dirname "$PROJ_PATH")
          echo "PROJECT_FILE=$PROJ_PATH" >> $GITHUB_ENV
          echo "PROJECT_DIR=$PROJ_DIR" >> $GITHUB_ENV
          echo "🎯 找到工程路径: $PROJ_PATH"

      - name: 3. 解析依赖
        run: |
          xcodebuild -resolvePackageDependencies -project "${{ env.PROJECT_FILE }}"

      - name: 4. 强制编译 (满血版)
        run: |
          # 自动获取第一个 Scheme
          SCHEME=$(xcodebuild -list -project "${{ env.PROJECT_FILE }}" | grep -A 5 "Schemes:" | tail -n 1 | xargs)
          echo "🚀 正在编译 Scheme: $SCHEME"
          
          xcodebuild build \
            -project "${{ env.PROJECT_FILE }}" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 5. 暴力提取大包
        run: |
          mkdir -p Payload
          # 在 Xcode 缓存里搜索编译出来的 .app 文件夹
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 还是没搜到产物，编译可能失败了"
            exit 1
          fi

          echo "✅ 捕获目标: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -qr YOLO-Full-App.ipa Payload
          # 打印大小，法师请盯着这行看！
          ls -lh YOLO-Full-App.ipa

      - name: 6. 发货
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-FINAL-IPA
          path: YOLO-Full-App.ipa
