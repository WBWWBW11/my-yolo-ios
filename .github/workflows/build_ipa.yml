name: Build YOLO iOS 侧载 IPA (终极满血版)

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 拉取代码
        uses: actions/checkout@v4

      - name: 2. 强力解析依赖
        run: |
          # 自动寻找第一个 xcodeproj 文件夹并进入其目录
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          PROJ_DIR=$(dirname "$PROJ_PATH")
          cd "$PROJ_DIR"
          xcodebuild -resolvePackageDependencies -project "$(basename "$PROJ_PATH")"

      - name: 3. 终极归档 (拒绝空壳)
        run: |
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          PROJ_DIR=$(dirname "$PROJ_PATH")
          SCHEME=$(xcodebuild -list -project "$PROJ_PATH" | grep -A 5 "Schemes:" | tail -n 1 | xargs)
          
          cd "$PROJ_DIR"
          # 强制生成归档，这是唯一能产生几十MB大包的方法
          xcodebuild archive \
            -project "$(basename "$PROJ_PATH")" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "../../YOLO.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 4. 提取并进行“生死检查”
        run: |
          mkdir -p Payload
          # 从归档文件中掏出真正的软件本体
          APP_PATH=$(find YOLO.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 严重错误：没找到二进制文件！"
            exit 1
          fi

          cp -R "$APP_PATH" Payload/
          zip -qr YOLO-Full.ipa Payload
          
          # 【真理时刻】检查大小。如果小于 2MB，说明是空壳，直接报错不让你下载。
          SIZE=$(du -m YOLO-Full.ipa | cut -f1)
          echo "📦 最终包大小: ${SIZE}MB"
          if [ "$SIZE" -lt 2 ]; then
            echo "❌ 警报：包太小了，这绝对不对！"
            exit 1
          fi

      - name: 5. 产物交付
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-FINAL-REAL-IPA
          path: YOLO-Full.ipa
