name: Build YOLO iOS 侧载 IPA (核弹级稳健版)

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 强行锁定并解析依赖
        run: |
          # 针对你的仓库结构，直接进入核心目录
          # 如果你的文件夹名还是“示例应用程序”，请确保代码中的路径完全匹配
          cd "示例应用程序/YOLORealTimeUIKit" || cd "ExampleApps/YOLORealTimeUIKit"
          echo "📦 正在强制解析 Swift Package 依赖..."
          xcodebuild -resolvePackageDependencies -project YOLORealTimeUIKit.xcodeproj

      - name: 3. 归档编译 (拒绝 480KB 空壳)
        run: |
          # 再次进入目录，确保环境一致
          cd "示例应用程序/YOLORealTimeUIKit" || cd "ExampleApps/YOLORealTimeUIKit"
          
          echo "🏗️ 开始归档 (Archive)..."
          xcodebuild archive \
            -project YOLORealTimeUIKit.xcodeproj \
            -scheme YOLORealTimeUIKit \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "../../YOLO.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: 4. 组装并进行“生死检查”
        run: |
          mkdir -p Payload
          # 精准定位生成的二进制文件
          APP_DIR=$(find YOLO.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_DIR" ]; then
            echo "❌ 严重错误：归档失败，没找到 .app 文件夹！"
            exit 1
          fi
          
          cp -r "$APP_DIR" Payload/
          zip -qr YOLO-Full-App.ipa Payload
          
          # 【真理检查】如果包小于 1MB，说明又是空壳，直接报错停止
          FILE_SIZE=$(stat -f%z "YOLO-Full-App.ipa")
          echo "📦 最终生成的 IPA 大小: $FILE_SIZE 字节"
          if [ $FILE_SIZE -lt 1000000 ]; then
            echo "❌ 警报：生成的包太小 ($FILE_SIZE)，这绝对是个空壳！请检查脚本中的路径是否正确。"
            exit 1
          fi

      - name: 5. 交付产物
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-FINAL-IPA
          path: YOLO-Full-App.ipa
