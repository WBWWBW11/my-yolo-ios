name: Build YOLO iOS 侧载 IPA (修复参数版)

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 强力解析依赖
        run: |
          cd ExampleApps/YOLORealTimeUIKit
          xcodebuild -resolvePackageDependencies -project YOLORealTimeUIKit.xcodeproj

      - name: 3. 强制编译 (去掉冲突参数)
        run: |
          cd ExampleApps/YOLORealTimeUIKit
          # 核心修正：删除了 -arch arm64，只保留 destination
          xcodebuild build \
            -project YOLORealTimeUIKit.xcodeproj \
            -scheme YOLORealTimeUIKit \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "../../build_output" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 4. 提取 .app 并打包 IPA
        run: |
          mkdir -p Payload
          # 既然指定了输出路径，直接去 build_output 里抓人
          APP_PATH=$(find build_output -name "YOLORealTimeUIKit.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 还是没搜到产物，列出当前结构排错："
            find build_output -maxdepth 5
            exit 1
          fi

          cp -R "$APP_PATH" Payload/
          zip -qr YOLO-Full-App.ipa Payload
          echo "✅ 最终包大小: $(du -sh YOLO-Full-App.ipa)"

      - name: 5. 提交产物
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-FINAL-IPA
          path: YOLO-Full-App.ipa
