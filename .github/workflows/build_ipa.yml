name: 全自动构建IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      # 🔥 自动下载模型，不用你上传，彻底解决模型缺失问题
      - name: 自动下载YOLO模型
        run: |
          mkdir -p "示例应用程序/YOLORealTimeUIKit/Models"
          curl -L https://github.com/ultralytics/assets/releases/download/v8.2.0/yolov8n.mlmodel \
            -o "示例应用程序/YOLORealTimeUIKit/Models/yolov8n.mlmodel"

      # 编译项目
      - name: Xcode编译打包
        run: |
          cd "示例应用程序/YOLORealTimeUIKit"
          xcodebuild archive \
            -project YOLORealTimeUIKit.xcodeproj \
            -scheme YOLORealTimeUIKit \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      # 生成IPA（绝对不会空）
      - name: 打包生成IPA
        run: |
          mkdir -p Payload
          cp -r $GITHUB_WORKSPACE/build.xcarchive/Products/Applications/*.app Payload/
          zip -r YOLO.ipa Payload

      # 上传成品
      - name: 上传IPA文件
        uses: actions/upload-artifact@v4
        with:
          name: 完整IPA包
          path: YOLO.ipa
