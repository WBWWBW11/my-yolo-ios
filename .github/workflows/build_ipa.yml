name: Build YOLO iOS 侧载 IPA (终极版)

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 强行锁定路径并解析依赖
        run: |
          # 根据你的日志，工程就在这个确定的路径下
          PROJ="ExampleApps/YOLORealTimeUIKit/YOLORealTimeUIKit.xcodeproj"
          xcodebuild -resolvePackageDependencies -project "$PROJ"

      - name: 3. 强行编译 (方案名直接锁死)
        run: |
          # 方案名直接锁死为 YOLORealTimeUIKit，不再让脚本瞎猜
          xcodebuild build \
            -project "ExampleApps/YOLORealTimeUIKit/YOLORealTimeUIKit.xcodeproj" \
            -scheme "YOLORealTimeUIKit" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 4. 提取并打包
        run: |
          mkdir -p Payload
          # 搜索路径优化，直接在标准输出位置找
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "YOLORealTimeUIKit.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
             echo "❌ 没找到产物，尝试备选搜索..."
             APP_PATH=$(find . -name "*.app" -type d | head -n 1)
          fi

          cp -R "$APP_PATH" Payload/
          zip -qr YOLO-Full-App.ipa Payload
          echo "✅ 最终包大小: $(du -sh YOLO-Full-App.ipa)"

      - name: 5. 最终发货
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-FINAL-IPA
          path: YOLO-Full-App.ipa
