name: Build YOLO iOS 侧载 IPA (彻底通关版)

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 强制搜索并定位工程 (Debug)
        run: |
          # 看看工程到底在哪，防止路径不对
          echo "🔍 正在全盘搜索工程文件..."
          find . -name "*.xcodeproj"
          PROJ_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          echo "FOUND_PROJ=$PROJ_PATH" >> $GITHUB_ENV
          echo "🎯 目标锁定: $PROJ_PATH"

      - name: 3. 强力解析依赖 (带重试机制)
        run: |
          # 针对 Code 65，强制清理缓存并重新解析
          xcodebuild -resolvePackageDependencies -project "${{ env.FOUND_PROJ }}" || \
          (sleep 5 && xcodebuild -resolvePackageDependencies -project "${{ env.FOUND_PROJ }}")

      - name: 4. 终极归档 (精简参数)
        run: |
          # 自动抓取 Scheme
          SCHEME=$(xcodebuild -list -project "${{ env.FOUND_PROJ }}" | grep -A 5 "Schemes:" | tail -n 1 | xargs)
          echo "🚀 正在编译方案: $SCHEME"
          
          # 只保留最核心参数，减少出错概率
          xcodebuild archive \
            -project "${{ env.FOUND_PROJ }}" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "./YOLO.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 5. 提取产物并检查大小
        run: |
          mkdir -p Payload
          APP_PATH=$(find YOLO.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 失败：归档文件中找不到二进制 App"
            exit 1
          fi

          cp -R "$APP_PATH" Payload/
          zip -qr YOLO-Final.ipa Payload
          
          # 真理检查
          SIZE=$(du -sh YOLO-Final.ipa | cut -f1)
          echo "📦 最终包大小: $SIZE"

      - name: 6. 上传
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-FINAL-IPA
          path: YOLO-Final.ipa
