name: 🚀 绝对出包-终极核弹版

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 搬运源码
        uses: actions/checkout@v4

      - name: 2. 暴力搜索工程
        run: |
          # 不管你在哪个文件夹，不管是不是中文名，直接搜死
          PROJ_FILE=$(find . -name "*.xcodeproj" | head -n 1)
          echo "PROJ_FILE=$PROJ_FILE" >> $GITHUB_ENV
          echo "🎯 锁定目标: $PROJ_FILE"

      - name: 3. 强力解析依赖
        run: |
          xcodebuild -resolvePackageDependencies -project "${{ env.PROJ_FILE }}"

      - name: 4. 归档“炼丹” (关键步骤)
        run: |
          # 自动抓取第一个 Scheme 名
          SCHEME=$(xcodebuild -list -project "${{ env.PROJ_FILE }}" | grep -A 5 "Schemes:" | tail -n 1 | xargs)
          echo "🔥 开始炼制 Scheme: $SCHEME"
          
          xcodebuild archive \
            -project "${{ env.PROJ_FILE }}" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "./YOLO.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 5. 暴力提取并进行“生死校验”
        run: |
          mkdir -p Payload
          # 搜寻归档里的软件本体
          APP_PATH=$(find YOLO.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 失败：没炼出东西！"
            exit 1
          fi

          cp -R "$APP_PATH" Payload/
          zip -qr YOLO-Final-Full.ipa Payload
          
          # 【真理时刻】检查大小。如果小于 5MB，直接自杀报警，不给空壳！
          SIZE_MB=$(du -m YOLO-Final-Full.ipa | cut -f1)
          echo "📦 最终包大小: ${SIZE_MB}MB"
          if [ "$SIZE_MB" -lt 5 ]; then
            echo "❌ 警报：这包是空的！检查源码是否有模型文件。"
            exit 1
          fi

      - name: 6. 顺丰出货
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-FULL-PACKAGE-DOWNLOAD-ME
          path: YOLO-Final-Full.ipa
