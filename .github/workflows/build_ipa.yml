name: Build YOLO iOS 侧载 IPA (全路径锁定版)

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 强力解析依赖 (进入子目录)
        run: |
          # 这一步直接进入你的工程文件夹，避免路径迷路
          cd ExampleApps/YOLORealTimeUIKit
          xcodebuild -resolvePackageDependencies -project YOLORealTimeUIKit.xcodeproj

      - name: 3. 强制编译并指定输出目录 (解决 Code 70)
        run: |
          # 进入子目录执行
          cd ExampleApps/YOLORealTimeUIKit
          # 我们手动指定 DerivedData 路径到根目录的 build_output
          xcodebuild build \
            -project YOLORealTimeUIKit.xcodeproj \
            -scheme YOLORealTimeUIKit \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -derivedDataPath "../../build_output" \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 4. 提取 .app 并打包 IPA
        run: |
          mkdir -p Payload
          # 因为我们在上一步指定了路径，现在产物位置是死掉的
          APP_PATH=$(find build_output -name "YOLORealTimeUIKit.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 依然没找到产物，列出目录结构排查："
            find build_output -maxdepth 5
            exit 1
          fi

          echo "✅ 成功捕获目标: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          zip -qr YOLO-Full-App.ipa Payload
          echo "📦 最终包大小: $(du -sh YOLO-Full-App.ipa)"

      - name: 5. 提交产物
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-FINAL-IPA
          path: YOLO-Full-App.ipa
