name: Build YOLO iOS Sideload IPA

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 下载源码
        uses: actions/checkout@v4

      - name: 2. 修复依赖并编译 (针对官方仓库优化)
        run: |
          PROJECT_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          
          echo "📦 正在解析 Swift Package 依赖..."
          xcodebuild -resolvePackageDependencies -project "$PROJECT_PATH"
          
          echo "🏗️ 开始满血编译..."
          # 强制锁定官方 App 的 Scheme 名 "YOLOIOSApp"
          # 加入 -destination 确保编译器知道它是为真机准备的
          xcodebuild build \
            -project "$PROJECT_PATH" \
            -scheme "YOLOIOSApp" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ALLOW_PROVISIONING_PROFILE_SPECIFIER_FAILURE=YES \
            COMPILER_INDEX_STORE_ENABLE=NO

      - name: 3. 暴力搜寻并提取大包
        run: |
          mkdir -p Payload
          # 在 Xcode 的深层缓存目录里寻找那个真正的 .app 文件夹
          BUILD_DIR=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$BUILD_DIR" ]; then
            echo "❌ 还是没找到 .app，编译可能中途失败了"
            exit 1
          fi
          
          echo "✅ 捕获目标: $BUILD_DIR"
          cp -R "$BUILD_DIR" Payload/
          zip -qr YOLO-Full-App.ipa Payload
          
          # 打印大小，法师请盯着这行看！
          ls -lh YOLO-Full-App.ipa

      - name: 4. 发货
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-FULL-IPA
          path: YOLO-Full-App.ipa
