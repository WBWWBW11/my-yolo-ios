name: 自动找项目构建IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 拉取项目代码
        uses: actions/checkout@v4

      # 🔍 自动查找所有Xcode项目文件
      - name: 查找Xcode项目
        id: find_project
        run: |
          # 遍历整个仓库，找到所有.xcodeproj文件
          PROJECT_FILE=$(find . -name "*.xcodeproj" -type d | head -n 1)
          if [ -z "$PROJECT_FILE" ]; then
            echo "❌ 仓库里找不到任何.xcodeproj文件！"
            exit 1
          fi
          echo "✅ 找到项目文件: $PROJECT_FILE"
          
          # 提取项目路径和名称
          PROJECT_DIR=$(dirname "$PROJECT_FILE")
          PROJECT_NAME=$(basename "$PROJECT_FILE" .xcodeproj)
          
          # 设置环境变量，后面步骤用
          echo "PROJECT_DIR=$PROJECT_DIR" >> $GITHUB_OUTPUT
          echo "PROJECT_NAME=$PROJECT_NAME" >> $GITHUB_OUTPUT

      # 自动下载模型（放在和项目同目录的Models里）
      - name: 下载YOLO模型
        run: |
          mkdir -p ${{ steps.find_project.outputs.PROJECT_DIR }}/Models
          curl -L https://github.com/ultralytics/assets/releases/download/v8.2.0/yolov8n.mlmodel \
            -o ${{ steps.find_project.outputs.PROJECT_DIR }}/Models/yolov8n.mlmodel

      # 动态构建，不用硬编码路径
      - name: Xcode构建归档
        run: |
          cd ${{ steps.find_project.outputs.PROJECT_DIR }}
          xcodebuild archive \
            -project ${{ steps.find_project.outputs.PROJECT_NAME }}.xcodeproj \
            -scheme ${{ steps.find_project.outputs.PROJECT_NAME }} \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $GITHUB_WORKSPACE/build.xcarchive \
            CODE_SIGNING_ALLOWED=NO

      # 打包IPA
      - name: 生成IPA
        run: |
          mkdir -p Payload
          APP_PATH=$(find $GITHUB_WORKSPACE/build.xcarchive/Products/Applications -name "*.app" -type d)
          cp -r $APP_PATH Payload/
          zip -r YOLO.ipa Payload

      - name: 上传IPA
        uses: actions/upload-artifact@v4
        with:
          name: 最终IPA
          path: YOLO.ipa
