name: 🚀 强制出货-带模型满血版

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 
    steps:
      - name: 1. 搬运源码
        uses: actions/checkout@v4

      - name: 2. 强行塞入模型 (不让包变空壳)
        run: |
          # 自动下载官方模型，防止包里没肉
          mkdir -p "示例应用程序/YOLORealTimeUIKit/Models"
          curl -L https://github.com/ultralytics/assets/releases/download/v8.2.0/yolov8n.mlmodel -o "示例应用程序/YOLORealTimeUIKit/Models/yolov8n.mlmodel"

      - name: 3. 归档“炼丹”
        run: |
          PROJ=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME=$(xcodebuild -list -project "$PROJ" | grep -A 5 "Schemes:" | tail -n 1 | xargs)
          
          xcodebuild archive \
            -project "$PROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "./YOLO.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 4. 提取并核查 (小于10MB直接报错)
        run: |
          mkdir -p Payload
          APP_DIR=$(find YOLO.xcarchive -name "*.app" -type d | head -n 1)
          cp -r "$APP_DIR" Payload/
          zip -qr YOLO-Full.ipa Payload
          
          SIZE_MB=$(du -m YOLO-Full.ipa | cut -f1)
          echo "📦 最终包大小: ${SIZE_MB}MB"
          if [ $SIZE_MB -lt 5 ]; then
            echo "❌ 警告：这包还是没肉，只有几百KB，别下载了！"
            exit 1
          fi

      - name: 5. 产物存放
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-REAL-PACKAGE
          path: YOLO-Full.ipa
