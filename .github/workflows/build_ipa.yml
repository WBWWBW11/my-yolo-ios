name: 终极出货-全路径死链模板
on:
  workflow_dispatch: # 保留手动触发

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: 1. 拉取源码
        uses: actions/checkout@v4.2.2 # 升级到支持 Node.js 24 的最新版本
        with:
          fetch-depth: 0 # 避免浅克隆导致的路径问题

      - name: 2. 下载模型（增加重试和错误检查）
        run: |
          mkdir -p "ExampleApps/YOLORealTimeUIKit/Models"
          echo "开始下载 yolov8n.mlmodel..."
          # 增加重试和超时，解决网络问题
          curl -L --retry 3 --connect-timeout 10 \
            https://github.com/ultralytics/assets/releases/download/v8.2.0/yolov8n.mlmodel \
            -o "ExampleApps/YOLORealTimeUIKit/Models/yolov8n.mlmodel"
          # 检查文件是否下载成功
          if [ ! -f "ExampleApps/YOLORealTimeUIKit/Models/yolov8n.mlmodel" ]; then
            echo "❌ 模型下载失败！"
            exit 1
          fi
          echo "✅ 模型下载成功！文件大小: $(du -h "ExampleApps/YOLORealTimeUIKit/Models/yolov8n.mlmodel")"

      - name: 3. Xcode 编译打包（修复路径和参数）
        run: |
          # 进入项目目录（确保路径正确）
          cd "ExampleApps/YOLORealTimeUIKit"
          echo "当前目录: $(pwd)"
          ls -la # 打印目录内容，方便排查路径问题

          # 编译并归档（修复路径和签名参数）
          xcodebuild archive \
            -project YOLORealTimeUIKit.xcodeproj \
            -scheme YOLORealTimeUIKit \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$GITHUB_WORKSPACE/YOLO.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 4. 导出 IPA（修复路径和检查逻辑）
        run: |
          mkdir -p Payload
          cd Payload
          # 从归档中提取 .app 文件
          APP_PATH=$(find "$GITHUB_WORKSPACE/YOLO.xcarchive/Products/Applications" -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "❌ 找不到编译生成的 .app 文件！"
            exit 1
          fi
          echo "找到 .app 文件: $APP_PATH"
          cp -r "$APP_PATH" .
          # 打包成 IPA
          zip -r "../YOLORealTimeUIKit.ipa" .
          cd ..
          # 检查 IPA 是否生成成功
          if [ ! -f "YOLORealTimeUIKit.ipa" ]; then
            echo "❌ IPA 打包失败！"
            exit 1
          fi
          echo "✅ IPA 打包成功！文件大小: $(du -h YOLORealTimeUIKit.ipa)"

      - name: 5. 上传 IPA 产物
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-IPA
          path: YOLORealTimeUIKit.ipa
