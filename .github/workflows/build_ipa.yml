name: Build YOLO iOS Sideload IPA

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 打印目录结构 (调试用)
        run: ls -R

      - name: 3. 解析依赖 (强制重试)
        run: |
          PROJ=$(find . -name "*.xcodeproj" | head -n 1)
          xcodebuild -resolvePackageDependencies -project "$PROJ" || xcodebuild -resolvePackageDependencies -project "$PROJ"

      - name: 4. 强制编译
        run: |
          # 自动寻找第一个工程文件和第一个 Scheme
          PROJ=$(find . -name "*.xcodeproj" | head -n 1)
          SCHEME=$(xcodebuild -list -project "$PROJ" | grep -A 5 "Schemes:" | tail -n 1 | xargs)
          
          echo "🚀 正在编译: $PROJ | Scheme: $SCHEME"
          
          xcodebuild build \
            -project "$PROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -arch arm64 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES \
            COMPILER_INDEX_STORE_ENABLE=NO \
            | xcpretty || xcodebuild build -project "$PROJ" -scheme "$SCHEME" -configuration Release -sdk iphoneos -destination 'generic/platform=iOS' CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY=""

      - name: 5. 提取并打包
        run: |
          mkdir -p Payload
          # 动态搜索编译出的 .app 文件夹
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "*.app" -type d | grep "Release-iphoneos" | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 依然没找到产物，请检查步骤 4 的日志"
            exit 1
          fi
          
          cp -R "$APP_PATH" Payload/
          zip -qr YOLO-App.ipa Payload
          echo "✅ 最终包大小: $(du -sh YOLO-App.ipa)"

      - name: 6. 上传
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-FINAL-IPA
          path: YOLO-App.ipa
