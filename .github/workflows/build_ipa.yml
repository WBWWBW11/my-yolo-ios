name: Build YOLO iOS 侧载 IPA (最终满血修复版)

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 检出代码
        uses: actions/checkout@v4

      - name: 2. 解析依赖
        run: |
          # 使用通配符定位工程，解决中文路径字符集问题
          PROJ=$(find . -name "*.xcodeproj" | head -n 1)
          xcodebuild -resolvePackageDependencies -project "$PROJ"

      - name: 3. 终极归档 (解决空壳问题)
        run: |
          PROJ=$(find . -name "*.xcodeproj" | head -n 1)
          # 自动获取 Scheme 名
          SCHEME=$(xcodebuild -list -project "$PROJ" | grep -A 5 "Schemes:" | tail -n 1 | xargs)
          
          echo "🚀 正在归档工程: $PROJ | 方案: $SCHEME"
          
          # 必须使用 archive 模式，这是生成满血版二进制的唯一保证
          xcodebuild archive \
            -project "$PROJ" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "./YOLO.xcarchive" \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 4. 提取满血产物并打包
        run: |
          mkdir -p Payload
          # 从归档包里精准定位 .app 文件夹
          APP_PATH=$(find YOLO.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_PATH" ]; then
            echo "❌ 归档失败，没找到二进制产物！"
            exit 1
          fi

          echo "✅ 成功捕获满血 App: $APP_PATH"
          cp -R "$APP_PATH" Payload/
          
          # 关键一步：检查打包大小
          zip -qr YOLO-Full-App.ipa Payload
          echo "📦 最终包大小报告："
          ls -lh YOLO-Full-App.ipa

      - name: 5. 发货
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-REAL-IPA
          path: YOLO-Full-App.ipa
