name: 🚀 Mac-终极出货版-正式通关

on: 
  workflow_dispatch: 

jobs:
  build:
    runs-on: macos-latest 

    steps:
      - name: 1. 挂载源码
        uses: actions/checkout@v4

      - name: 2. 定位工程并存入全局变量
        run: |
          # 强制寻找工程文件
          RAW_PATH=$(find . -name "*.xcodeproj" | head -n 1)
          echo "FOUND_PROJ_PATH=$RAW_PATH" >> $GITHUB_ENV
          echo "FOUND_PROJ_DIR=$(dirname "$RAW_PATH")" >> $GITHUB_ENV
          echo "FOUND_PROJ_NAME=$(basename "$RAW_PATH")" >> $GITHUB_ENV
          echo "🎯 找到目标: $RAW_PATH"

      - name: 3. 强力解析依赖
        run: |
          cd "${{ env.FOUND_PROJ_DIR }}"
          xcodebuild -resolvePackageDependencies -project "${{ env.FOUND_PROJ_NAME }}"

      - name: 4. 归档“炼丹” (这次绝对有炉子)
        run: |
          cd "${{ env.FOUND_PROJ_DIR }}"
          # 自动抓取 Scheme
          SCHEME=$(xcodebuild -list -project "${{ env.FOUND_PROJ_NAME }}" | grep -A 5 "Schemes:" | tail -n 1 | xargs)
          echo "🚀 正在编译方案: $SCHEME"
          
          xcodebuild archive \
            -project "${{ env.FOUND_PROJ_NAME }}" \
            -scheme "$SCHEME" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "../../YOLO.xcarchive" \
            -destination 'generic/platform=iOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            AD_HOC_CODE_SIGNING_ALLOWED=YES

      - name: 5. 提取产物并做体积检查
        run: |
          mkdir -p Payload
          APP_DIR=$(find YOLO.xcarchive -name "*.app" -type d | head -n 1)
          
          if [ -z "$APP_DIR" ]; then
            echo "❌ 归档失败，云端没产出二进制！"
            exit 1
          fi

          cp -r "$APP_DIR" Payload/
          zip -qr YOLO-Full.ipa Payload
          
          # 验证体积
          FILE_SIZE=$(du -m YOLO-Full.ipa | cut -f1)
          echo "📦 最终生成的包大小: ${FILE_SIZE}MB"
          if [ $FILE_SIZE -lt 2 ]; then
            echo "❌ 警报：生成的依然是空壳包！"
            exit 1
          fi

      - name: 6. 产物存放
        uses: actions/upload-artifact@v4
        with:
          name: YOLO-IPA-FINAL
          path: YOLO-Full.ipa
